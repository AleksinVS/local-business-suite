{% extends "base.html" %}

{% block title %}Заявка на изменение .env{% endblock %}

{% block content %}
<section class="panel">
  <div class="section-head">
    <div>
      <p class="eyebrow">Процесс согласования</p>
      <h1>Заявка на изменение .env</h1>
    </div>
  </div>
  <form method="post" class="settings-small-form">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="table-actions">
      <button type="submit" class="button">Создать заявку</button>
    </div>
  </form>
</section>
{% endblock %}
