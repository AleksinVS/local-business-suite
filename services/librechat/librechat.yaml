version: 1.3.5
cache: true

endpoints:
  custom:
    - name: "OpenAI"
      apiKey: "${OPENAI_API_KEY}"
      baseURL: "https://api.openai.com/v1"
      models:
        default:
          - "gpt-4.1-mini"
        fetch: true
      titleConvo: true
      titleModel: "gpt-4.1-mini"
      modelDisplayLabel: "OpenAI"

mcpServers:
  local-business-suite:
    type: streamable-http
    url: "http://agent-runtime:8090/mcp"
    chatMenu: true
