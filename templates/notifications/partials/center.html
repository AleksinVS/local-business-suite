<div class="notification-center" id="notification-center">
  <button
    type="button"
    class="notification-button"
    id="notification-toggle"
    aria-expanded="false"
    aria-controls="notification-dropdown"
    aria-label="Уведомления"
    title="Уведомления"
  >
    <span class="notification-button-icon" aria-hidden="true">!</span>
    <span class="notification-button-text">Уведомления</span>
    <span class="notification-count" id="notification-count" hidden>0</span>
  </button>
  <section class="notification-dropdown" id="notification-dropdown" aria-label="Центр уведомлений" hidden>
    <div class="notification-dropdown-head">
      <div>
        <h2>Уведомления</h2>
        <p id="notification-status-text">Загрузка...</p>
      </div>
      <div class="notification-head-links">
        <a href="{% url 'notifications:devices' %}" class="notification-link">Устройства</a>
        <a href="{% url 'notifications:center' %}" class="notification-link">Все</a>
      </div>
    </div>
    <div class="notification-permission-panel" id="notification-permission-panel">
      <p id="notification-permission-text">
        Браузерные уведомления приходят, пока портал открыт во вкладке или PWA-окне.
      </p>
      <div class="notification-permission-actions">
        <button type="button" class="notification-small-button" id="notification-enable-button">
          Включить
        </button>
        <button type="button" class="notification-small-button notification-small-button-muted" id="notification-disable-button" hidden>
          Выключить
        </button>
      </div>
    </div>
    <div class="notification-list" id="notification-list">
      <div class="notification-empty">Новых уведомлений нет.</div>
    </div>
  </section>
</div>
