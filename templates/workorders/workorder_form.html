{% extends "base.html" %}

{% block content %}
<section class="panel">
  <h1>{% if object %}Редактирование заявки{% else %}Новая заявка{% endif %}</h1>
  <form method="post" class="stack">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{% if object %}Сохранить{% else %}Создать{% endif %}</button>
  </form>
</section>
{% endblock %}
