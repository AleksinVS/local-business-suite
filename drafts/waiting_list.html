<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лист ожидания - Медицинские исследования</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --bg-color: #f3f4f6;
      --surface: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --danger: #ef4444;
      --danger-bg: #fee2e2;
      --success: #10b981;
      --success-bg: #d1fae5;
      --warning: #f59e0b;
      --warning-bg: #fef3c7;
      --transition: 0.2s ease-in-out;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      background-color: var(--surface);
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      z-index: 10;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1::before {
      content: '';
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: var(--primary);
    }

    .keyboard-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--bg-color);
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* Main Layout */
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px;
      overflow: hidden;
      gap: 20px;
      position: relative;
    }

    /* Toolbar (Filters & Actions) */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
    }

    .filters {
      display: flex;
      gap: 16px;
      flex: 1;
      align-items: center;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .input-group label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    input[type="text"], input[type="date"], select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.875rem;
      outline: none;
      transition: border-color var(--transition);
      min-width: 180px;
    }

    input[type="text"]:focus, input[type="date"]:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      cursor: pointer;
    }

    .checkbox-group input {
      width: 16px;
      height: 16px;
      accent-color: var(--danger);
      cursor: pointer;
    }

    .checkbox-group span {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--danger);
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all var(--transition);
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      box-shadow: 0 6px 8px -1px rgba(59, 130, 246, 0.4);
    }
    
    .btn-outline {
      background-color: transparent;
      border: 1px solid var(--border);
      color: var(--text-main);
    }

    .btn-outline:hover {
      background-color: var(--bg-color);
    }

    /* Table Surface */
    .table-container {
      background: var(--surface);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      flex: 1;
      overflow: auto;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    thead {
      position: sticky;
      top: 0;
      background-color: #f9fafb;
      z-index: 1;
    }

    th {
      padding: 12px 16px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 2px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    th:hover {
      color: var(--text-main);
    }

    td {
      padding: 16px;
      font-size: 0.875rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-main);
      vertical-align: middle;
    }

    tbody tr {
      transition: background-color var(--transition);
      cursor: pointer;
    }

    tbody tr:hover {
      background-color: var(--bg-color);
    }

    /* Status Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-waiting { background: var(--warning-bg); color: #b45309; }
    .badge-scheduled { background: #e0e7ff; color: #4338ca; }
    .badge-confirmed { background: var(--success-bg); color: #047857; }
    .badge-cancelled { background: var(--bg-color); color: var(--text-muted); }

    .cito-indicator {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--danger-bg);
      color: var(--danger);
      font-size: 0.7rem;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
    }

    /* Side Drawer */
    .drawer-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(2px);
      z-index: 20;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .drawer-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .drawer {
      position: absolute;
      top: 0;
      right: -500px;
      width: 450px;
      height: 100%;
      background: var(--surface);
      box-shadow: -4px 0 15px rgba(0, 0, 0, 0.1);
      z-index: 30;
      display: flex;
      flex-direction: column;
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .drawer.active {
      right: 0;
    }

    .drawer-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .drawer-header h2 {
      font-size: 1.125rem;
      font-weight: 600;
    }

    .close-btn {
      background: transparent;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: color var(--transition);
    }
    
    .close-btn:hover { color: var(--text-main); }

    .drawer-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-grid .full-width {
      grid-column: 1 / -1;
    }

    .drawer-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      background: #f9fafb;
    }

    /* Action Stack */
    .action-stack {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .action-stack .btn {
      padding: 6px 12px;
      font-size: 0.75rem;
    }
    
    .btn-status-confirm { background: var(--success-bg); color: #047857; border: 1px solid #a7f3d0; }
    .btn-status-confirm:hover { background: #a7f3d0; }
    .btn-status-wait { background: var(--warning-bg); color: #b45309; border: 1px solid #fde68a; }
    .btn-status-wait:hover { background: #fde68a; }
    .btn-status-cancel { background: var(--danger-bg); color: var(--danger); border: 1px solid #fecaca; }
    .btn-status-cancel:hover { background: #fecaca; }

    /* Timeline */
    .timeline {
      position: relative;
      margin-top: 8px;
      padding-left: 16px;
    }
    
    .timeline::before {
      content: '';
      position: absolute;
      left: 3px;
      top: 4px;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }

    .timeline-item {
      position: relative;
      margin-bottom: 16px;
    }
    
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -17px;
      top: 4px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary);
      border: 2px solid var(--surface);
    }

    .timeline-time {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .timeline-text {
      font-size: 0.85rem;
      color: var(--text-main);
    }
    
    .timeline-user {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--primary);
    }

    textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.875rem;
      resize: vertical;
      min-height: 80px;
      outline: none;
    }
    textarea:focus {
      border-color: var(--primary);
    }

    /* Utilities */
    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <header>
    <h1>Лист ожидания</h1>
    <div class="keyboard-hints">
      <span class="keyboard-hint">Alt+N : Новая запись</span>
      <span class="keyboard-hint">Esc : Закрыть окно</span>
    </div>
  </header>

  <div class="container">
    <div class="toolbar">
      <div class="filters">
        <div class="input-group">
          <label for="filterService">Услуга</label>
          <select id="filterService">
            <option value="all">Все услуги</option>
            <option value="s1">КТ головного мозга</option>
            <option value="s2">МРТ позвоночника</option>
            <option value="s3">Рентген грудной клетки</option>
          </select>
        </div>
        
        <div class="input-group">
          <label for="filterSearch">Поиск пациента</label>
          <input type="text" id="filterSearch" placeholder="ФИО или Дата рожд.">
        </div>

        <div class="input-group">
          <label for="filterDate">Целевая дата с</label>
          <input type="date" id="filterDate">
        </div>

        <label class="checkbox-group">
          <input type="checkbox" id="filterCito">
          <span>Только CITO!</span>
        </label>
      </div>

      <button class="btn btn-primary" id="btnAddEntry" title="Горячая клавиша: Alt+N">
        + Добавить запись
      </button>
    </div>

    <div class="table-container">
      <table id="dataTable">
        <thead>
          <tr>
            <th data-sort="created_at">Дата создания ↕</th>
            <th data-sort="patient_name">Пациент ↕</th>
            <th>Контакты</th>
            <th data-sort="service_id">Услуга ↕</th>
            <th data-sort="date_tag">Целевая дата ↕</th>
            <th data-sort="status">Статус ↕</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Rows rendered by JS -->
        </tbody>
      </table>
    </div>

    <!-- Overlay & Drawer -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer" id="sideDrawer">
      <div class="drawer-header">
        <h2 id="drawerTitle">Детали записи</h2>
        <button class="close-btn" id="btnCloseDrawer">&times;</button>
      </div>
      
      <div class="drawer-content">
        <!-- Status quick actions -->
        <div class="input-group full-width" id="statusActionsContainer">
          <label>Быстрая смена статуса</label>
          <div class="action-stack">
            <button class="btn btn-status-wait" onclick="updateStatus('waiting')">Вернуть в очередь</button>
            <button class="btn btn-status-confirm" onclick="updateStatus('scheduled')">Назначить</button>
            <button class="btn btn-status-confirm" onclick="updateStatus('confirmed')">Подтвердить</button>
            <button class="btn btn-status-cancel" onclick="updateStatus('cancelled')">Отменить</button>
          </div>
        </div>

        <form id="entryForm" class="form-grid">
          <input type="hidden" id="entryId">
          
          <div class="input-group full-width">
            <label>ФИО пациента *</label>
            <input type="text" id="patientName" required>
          </div>

          <div class="input-group">
            <label>Дата рождения *</label>
            <input type="text" id="patientDob" placeholder="ДД.ММ.ГГГГ" required>
          </div>

          <div class="input-group">
            <label>Телефон *</label>
            <input type="text" id="patientPhone" placeholder="+7 (___) ___-__-__" required>
          </div>

          <div class="input-group full-width">
            <label>Услуга *</label>
            <select id="serviceId" required>
              <option value="s1">КТ головного мозга</option>
              <option value="s2">МРТ позвоночника</option>
              <option value="s3">Рентген грудной клетки</option>
            </select>
          </div>

          <div class="input-group">
            <label>С даты (Целевая)</label>
            <input type="date" id="dateTag">
          </div>

          <div class="input-group">
            <label>По дату (Крайняя)</label>
            <input type="date" id="dateEnd">
          </div>

          <label class="checkbox-group full-width" style="margin-top: 0">
            <input type="checkbox" id="priorityCito">
            <span>Срочно (CITO!)</span>
          </label>

          <div class="input-group full-width">
            <label>Комментарий</label>
            <textarea id="entryComment"></textarea>
          </div>
        </form>

        <div class="input-group full-width" id="auditLogContainer">
          <label>История изменений</label>
          <div class="timeline" id="auditTimeline">
            <!-- Timeline injected via JS -->
          </div>
        </div>
      </div>

      <div class="drawer-footer">
        <button class="btn btn-outline" id="btnCancel">Отмена</button>
        <button class="btn btn-primary" id="btnSave">Сохранить</button>
      </div>
    </div>
  </div>

  <script>
    // --- Data Models & Mock Data ---
    const SERVICES = {
      's1': 'КТ головного мозга',
      's2': 'МРТ позвоночника',
      's3': 'Рентген грудной клетки'
    };

    const STATUSES = {
      'waiting': { label: 'В очереди', class: 'badge-waiting' },
      'scheduled': { label: 'Назначена', class: 'badge-scheduled' },
      'confirmed': { label: 'Подтверждена', class: 'badge-confirmed' },
      'cancelled': { label: 'Отменена', class: 'badge-cancelled' }
    };

    let entries = [
      {
        id: '1',
        service_id: 's1',
        patient_name: 'Иванов Иван Иванович',
        patient_dob: '15.04.1985',
        patient_phone: '+7 (903) 123-45-67',
        status: 'waiting',
        priority_cito: true,
        date_tag: '2024-05-10',
        date_end: '2024-05-15',
        created_at: '2024-04-20T10:30:00',
        comment: 'Пациент жалуется на частые боли.',
        history: [
          { user_id: 'Система', timestamp: '2024-04-20T10:30:00', action_description: 'Запись создана' }
        ]
      },
      {
        id: '2',
        service_id: 's2',
        patient_name: 'Петрова Анна Сергеевна',
        patient_dob: '22.08.1990',
        patient_phone: '+7 (916) 987-65-43',
        status: 'confirmed',
        priority_cito: false,
        date_tag: '2024-04-25',
        date_end: '',
        created_at: '2024-04-18T14:15:00',
        comment: '',
        history: [
          { user_id: 'Система', timestamp: '2024-04-18T14:15:00', action_description: 'Запись создана' },
          { user_id: 'Админ (Врач)', timestamp: '2024-04-19T09:00:00', action_description: 'Статус изменен на "Подтверждена"' }
        ]
      }
    ];

    // --- State Management ---
    let filters = { service: 'all', search: '', date: '', cito: false };
    let currentSort = { field: 'created_at', asc: false };
    let activeEntryId = null;

    // --- DOM Elements ---
    const tableBody = document.getElementById('tableBody');
    const filterService = document.getElementById('filterService');
    const filterSearch = document.getElementById('filterSearch');
    const filterDate = document.getElementById('filterDate');
    const filterCito = document.getElementById('filterCito');
    
    const sideDrawer = document.getElementById('sideDrawer');
    const drawerOverlay = document.getElementById('drawerOverlay');
    const drawerTitle = document.getElementById('drawerTitle');
    const btnAddEntry = document.getElementById('btnAddEntry');
    const btnCloseDrawer = document.getElementById('btnCloseDrawer');
    const btnCancel = document.getElementById('btnCancel');
    const btnSave = document.getElementById('btnSave');
    
    // Form Elements
    const formFields = {
      id: document.getElementById('entryId'),
      name: document.getElementById('patientName'),
      dob: document.getElementById('patientDob'),
      phone: document.getElementById('patientPhone'),
      serviceId: document.getElementById('serviceId'),
      dateTag: document.getElementById('dateTag'),
      dateEnd: document.getElementById('dateEnd'),
      cito: document.getElementById('priorityCito'),
      comment: document.getElementById('entryComment')
    };
    const auditTimeline = document.getElementById('auditTimeline');
    const auditLogContainer = document.getElementById('auditLogContainer');
    const statusActionsContainer = document.getElementById('statusActionsContainer');

    // --- Render Logic ---
    function formatDate(isoString) {
      if (!isoString) return '-';
      const d = new Date(isoString);
      return d.toLocaleDateString('ru-RU');
    }

    function formatDateTime(isoString) {
      if (!isoString) return '-';
      const d = new Date(isoString);
      return d.toLocaleDateString('ru-RU') + ' ' + d.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
    }

    // Helper: generate UUID
    function generateUUID() {
      return Math.random().toString(36).substring(2) + Date.now().toString(36);
    }

    function renderTable() {
      // Apply filters
      let filtered = entries.filter(e => {
        if (filters.service !== 'all' && e.service_id !== filters.service) return false;
        if (filters.cito && !e.priority_cito) return false;
        if (filters.date && e.date_tag !== filters.date) return false;
        if (filters.search) {
          const q = filters.search.toLowerCase();
          return e.patient_name.toLowerCase().includes(q) || e.patient_dob.includes(q);
        }
        return true;
      });

      // Apply sorting
      filtered.sort((a, b) => {
        let valA = a[currentSort.field];
        let valB = b[currentSort.field];
        if (valA < valB) return currentSort.asc ? -1 : 1;
        if (valA > valB) return currentSort.asc ? 1 : -1;
        return 0;
      });

      // Render HTML
      if (filtered.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="6" class="empty-state">Ничего не найдено</td></tr>';
        return;
      }

      tableBody.innerHTML = filtered.map(e => `
        <tr onclick="openDrawer('${e.id}')">
          <td>${formatDateTime(e.created_at)}</td>
          <td>
            <strong>${e.patient_name}</strong>
            <br><span style="font-size: 0.75rem; color: var(--text-muted)">Дата рожд: ${e.patient_dob}</span>
          </td>
          <td>${e.patient_phone}</td>
          <td>${SERVICES[e.service_id]}</td>
          <td>
            ${formatDate(e.date_tag)}
            ${e.priority_cito ? '<span class="cito-indicator">CITO!</span>' : ''}
          </td>
          <td>
            <span class="badge ${STATUSES[e.status].class}">${STATUSES[e.status].label}</span>
          </td>
        </tr>
      `).join('');
    }

    function renderTimeline(history) {
      if (!history || history.length === 0) {
        auditTimeline.innerHTML = '<div class="timeline-text" style="color:var(--text-muted)">Нет истории</div>';
        return;
      }
      // Reverse to show newest first
      const sortedHistory = [...history].reverse();
      auditTimeline.innerHTML = sortedHistory.map(h => `
        <div class="timeline-item">
          <div class="timeline-time">${formatDateTime(h.timestamp)}</div>
          <div class="timeline-text"><span class="timeline-user">${h.user_id}</span>: ${h.action_description}</div>
        </div>
      `).join('');
    }

    // --- Drawer Logic ---
    function openDrawer(id = null) {
      activeEntryId = id;
      drawerOverlay.classList.add('active');
      sideDrawer.classList.add('active');

      if (id) {
        drawerTitle.textContent = "Детали записи";
        const entry = entries.find(e => e.id === id);
        formFields.id.value = entry.id;
        formFields.name.value = entry.patient_name;
        formFields.dob.value = entry.patient_dob;
        formFields.phone.value = entry.patient_phone;
        formFields.serviceId.value = entry.service_id;
        formFields.dateTag.value = entry.date_tag || '';
        formFields.dateEnd.value = entry.date_end || '';
        formFields.cito.checked = entry.priority_cito;
        formFields.comment.value = entry.comment || '';
        
        auditLogContainer.style.display = 'flex';
        statusActionsContainer.style.display = 'flex';
        renderTimeline(entry.history);
      } else {
        drawerTitle.textContent = "Новая запись";
        document.getElementById('entryForm').reset();
        formFields.id.value = '';
        auditLogContainer.style.display = 'none';
        statusActionsContainer.style.display = 'none';
      }
    }

    function closeDrawer() {
      drawerOverlay.classList.remove('active');
      sideDrawer.classList.remove('active');
      activeEntryId = null;
    }

    function updateStatus(newStatus) {
      if (!activeEntryId) return;
      const entry = entries.find(e => e.id === activeEntryId);
      if (entry && entry.status !== newStatus) {
        entry.status = newStatus;
        entry.history.push({
          user_id: 'Текущий Пользователь',
          timestamp: new Date().toISOString(),
          action_description: `Статус изменен на "${STATUSES[newStatus].label}"`
        });
        renderTimeline(entry.history);
        renderTable();
      }
    }

    function saveEntry() {
      // Basic validation
      if (!formFields.name.value || !formFields.phone.value) {
        alert("Заполните обязательные поля: ФИО и Телефон");
        return;
      }

      const entryData = {
        id: formFields.id.value || generateUUID(),
        service_id: formFields.serviceId.value,
        patient_name: formFields.name.value,
        patient_dob: formFields.dob.value,
        patient_phone: formFields.phone.value,
        priority_cito: formFields.cito.checked,
        date_tag: formFields.dateTag.value,
        date_end: formFields.dateEnd.value,
        comment: formFields.comment.value,
      };

      if (!formFields.id.value) {
        // Create new
        entryData.status = 'waiting';
        entryData.created_at = new Date().toISOString();
        entryData.history = [{
          user_id: 'Текущий Пользователь',
          timestamp: new Date().toISOString(),
          action_description: 'Запись создана'
        }];
        entries.push(entryData);
      } else {
        // Update existing
        const index = entries.findIndex(e => e.id === entryData.id);
        const oldEntry = entries[index];
        entryData.status = oldEntry.status; // Persist status
        entryData.created_at = oldEntry.created_at; // Persist creation date
        entryData.history = oldEntry.history;
        entryData.history.push({
          user_id: 'Текущий Пользователь',
          timestamp: new Date().toISOString(),
          action_description: 'Данные записи обновлены'
        });
        entries[index] = entryData;
      }
      
      closeDrawer();
      renderTable();
    }

    // --- Input Masks ---
    function applyPhoneMask(e) {
      let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
      if (!x[2]) {
         e.target.value = x[1] === '7' || x[1] === '8' ? '+7 (' : '+7 (' + x[1];
      } else {
         e.target.value = !x[3] ? '+7 (' + x[2] : '+7 (' + x[2] + ') ' + x[3] + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
      }
    }

    function applyDobMask(e) {
      let v = e.target.value.replace(/\D/g, '').slice(0, 8);
      if (v.length >= 5) {
        e.target.value = `${v.slice(0, 2)}.${v.slice(2, 4)}.${v.slice(4)}`;
      } else if (v.length >= 3) {
        e.target.value = `${v.slice(0, 2)}.${v.slice(2)}`;
      } else {
        e.target.value = v;
      }
    }

    formFields.phone.addEventListener('input', applyPhoneMask);
    formFields.dob.addEventListener('input', applyDobMask);

    // --- Event Listeners ---
    // Filters (Live Search)
    const updateFilters = () => {
      filters.service = filterService.value;
      filters.search = filterSearch.value;
      filters.date = filterDate.value;
      filters.cito = filterCito.checked;
      renderTable();
    };

    filterService.addEventListener('change', updateFilters);
    filterSearch.addEventListener('input', updateFilters);
    filterDate.addEventListener('change', updateFilters);
    filterCito.addEventListener('change', updateFilters);

    // Sorting
    document.querySelectorAll('th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const field = th.dataset.sort;
        if (currentSort.field === field) {
          currentSort.asc = !currentSort.asc;
        } else {
          currentSort.field = field;
          currentSort.asc = true;
        }
        renderTable();
      });
    });

    // Drawer Controls
    btnAddEntry.addEventListener('click', () => openDrawer());
    btnCloseDrawer.addEventListener('click', closeDrawer);
    btnCancel.addEventListener('click', closeDrawer);
    drawerOverlay.addEventListener('click', closeDrawer);
    btnSave.addEventListener('click', saveEntry);

    // Hotkeys
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && sideDrawer.classList.contains('active')) {
        closeDrawer();
      }
      if (e.altKey && e.key.toLowerCase() === 'n') {
        e.preventDefault();
        openDrawer();
      }
    });

    // --- Init ---
    renderTable();

  </script>
</body>
</html>
