services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      LOCAL_BUSINESS_AGENT_RUNTIME_URL: http://agent-runtime:8090
      LOCAL_BUSINESS_COPILOTKIT_RUNTIME_URL: /copilotkit
    volumes:
      - ./data:/app/data
  agent-runtime:
    build:
      context: .
      dockerfile: services/agent_runtime/Dockerfile
    env_file:
      - .env
    environment:
      DJANGO_AI_GATEWAY_URL: http://web:8000/ai/gateway
    depends_on:
      - web
    ports:
      - "8090:8090"
  copilot-runtime:
    build:
      context: .
      dockerfile: services/copilot_runtime/Dockerfile
    env_file:
      - .env
    environment:
      LOCAL_BUSINESS_AGENT_RUNTIME_AG_UI_URL: http://agent-runtime:8090/ag-ui
      COPILOTKIT_BASE_PATH: /copilotkit
      COPILOTKIT_RUNTIME_PORT: 3100
      COPILOTKIT_TELEMETRY_DISABLED: "true"
    depends_on:
      - agent-runtime
    ports:
      - "3100:3100"
