version: 1.3.5
cache: true

endpoints:
  custom:
    - name: "OpenAI Compatible"
      apiKey: "${OPENAI_API_KEY}"
      baseURL: "${OPENAI_BASE_URL}"
      models:
        default:
          - "${AI_AGENT_MODEL_NAME}"
        fetch: true
      titleConvo: true
      titleModel: "${AI_AGENT_MODEL_NAME}"
      modelDisplayLabel: "OpenAI Compatible"

mcpServers:
  local-business-suite:
    type: streamable-http
    url: "http://agent-runtime:8090/mcp"
    chatMenu: true
  context7:
    type: streamable-http
    url: "https://mcp.context7.com/mcp"
    chatMenu: true
