version: "3.8"

services:
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ./db:/app/db
      - ./media:/app/media
      - ./logs:/app/logs
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy_data:/data
    networks:
      - internal
    depends_on:
      - web

networks:
  internal:
    driver: bridge

volumes:
  db:
  media:
  static:
  caddy_data:
  logs:
