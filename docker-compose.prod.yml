services:
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ./db:/app/db
      - ./media:/app/media
      - ./logs:/app/logs
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  agent-runtime:
    build:
      context: .
      dockerfile: services/agent_runtime/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    networks:
      - internal
    depends_on:
      - web
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/health').read()\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy_data:/data
    networks:
      - internal
    depends_on:
      - web
      - agent-runtime

networks:
  internal:
    external: true
    name: ${LOCAL_BUSINESS_SHARED_NETWORK:-local-business-suite_internal}

volumes:
  db:
  media:
  static:
  caddy_data:
  logs:
