<section class="panel" id="status-panel">
  <h2>Смена статуса</h2>
  <div class="status-inline">
    <span class="badge">{{ workorder.get_status_display }}</span>
  </div>
  {% if transition_choices %}
    <form
      action="{% url 'workorders:transition' workorder.pk %}"
      method="post"
      class="inline-form"
      hx-post="{% url 'workorders:transition' workorder.pk %}"
      hx-target="#status-panel"
      hx-swap="outerHTML"
    >
      {% csrf_token %}
      <select name="status">
        {% for value, label in transition_choices %}
          <option value="{{ value }}">{{ label }}</option>
        {% endfor %}
      </select>
      <button type="submit">Обновить</button>
    </form>
  {% else %}
    <p>Для вашей роли допустимых переходов нет.</p>
  {% endif %}
</section>
