<div class="input-group view-switcher-group" aria-label="Режим просмотра заявок">
  <label>Вид</label>
  <div class="segmented-control">
    <a
      href="{{ view_urls.board }}"
      class="segmented-option {% if current_view == 'board' %}active{% endif %}"
      aria-current="{% if current_view == 'board' %}page{% else %}false{% endif %}"
    >
      Доска
    </a>
    <a
      href="{{ view_urls.tree }}"
      class="segmented-option {% if current_view == 'tree' %}active{% endif %}"
      aria-current="{% if current_view == 'tree' %}page{% else %}false{% endif %}"
    >
      Дерево
    </a>
  </div>
</div>
