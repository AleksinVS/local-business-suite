services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./db:/app/db
      - ./media:/app/media
  agent-runtime:
    build:
      context: .
      dockerfile: services/agent_runtime/Dockerfile
    env_file:
      - .env
    depends_on:
      - web
    ports:
      - "8090:8090"
