{% extends "base.html" %}

{% block title %}Уведомления - {{ app_display_name }}{% endblock %}

{% block content %}
  <section class="panel notifications-page">
    <div class="panel-header-row">
      <div>
        <h2>Уведомления</h2>
        <p class="text-muted">Здесь отображаются последние события, доступные вашей учетной записи.</p>
      </div>
      <div class="notification-page-actions">
        <a class="button-link button-link-muted" href="{% url 'notifications:devices' %}">Устройства</a>
        <button type="button" class="button-link" id="notifications-page-enable-button">Включить браузерные уведомления</button>
      </div>
    </div>
    <div id="notifications-page-list" class="notification-list notification-list-page">
      <div class="notification-empty">Загрузка уведомлений...</div>
    </div>
  </section>
{% endblock %}
