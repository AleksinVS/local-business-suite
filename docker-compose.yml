services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      LOCAL_BUSINESS_AGENT_RUNTIME_URL: http://agent-runtime:8090
    volumes:
      - ./data:/app/data
  agent-runtime:
    build:
      context: .
      dockerfile: services/agent_runtime/Dockerfile
    env_file:
      - .env
    environment:
      DJANGO_AI_GATEWAY_URL: http://web:8000/ai/gateway
    depends_on:
      - web
    ports:
      - "8090:8090"
