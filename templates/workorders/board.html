{% extends "base.html" %}

{% block content %}
<div class="board-page">
<nav class="breadcrumbs">
  <a href="{% url 'core:dashboard' %}">Local Business Suite</a>
  <span>/</span>
  <span>Канбан заявок ТО и ремонтов</span>
</nav>
<section class="panel board-header-panel">
  <form method="get" class="filters filters-compact">
    <input type="hidden" name="view" value="board">
    <input
      type="search"
      name="q"
      value="{{ filters.q }}"
      placeholder="Номер, заголовок, изделие"
      hx-get="{% url 'workorders:board' %}"
      hx-target="#board-columns"
      hx-swap="outerHTML"
      hx-trigger="keyup changed delay:250ms, search"
      hx-include="closest form"
    >
    <select
      name="department"
      hx-get="{% url 'workorders:board' %}"
      hx-target="#board-columns"
      hx-swap="outerHTML"
      hx-trigger="change"
      hx-include="closest form"
    >
      <option value="">Все подразделения</option>
      {% for department in departments %}
        <option value="{{ department }}" {% if filters.department == department %}selected{% endif %}>{{ department }}</option>
      {% endfor %}
    </select>
    <select
      name="status"
      hx-get="{% url 'workorders:board' %}"
      hx-target="#board-columns"
      hx-swap="outerHTML"
      hx-trigger="change"
      hx-include="closest form"
    >
      <option value="">Все статусы</option>
      {% for value, label in status_choices %}
        <option value="{{ value }}" {% if filters.status == value %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
    <select
      name="assignee"
      hx-get="{% url 'workorders:board' %}"
      hx-target="#board-columns"
      hx-swap="outerHTML"
      hx-trigger="change"
      hx-include="closest form"
    >
      <option value="">Все исполнители</option>
      {% for assignee in assignees %}
        <option value="{{ assignee.id }}" {% if filters.assignee == assignee.id|stringformat:"s" %}selected{% endif %}>{{ assignee.get_full_name|default:assignee.username }}</option>
      {% endfor %}
    </select>
    <select
      name="device"
      hx-get="{% url 'workorders:board' %}"
      hx-target="#board-columns"
      hx-swap="outerHTML"
      hx-trigger="change"
      hx-include="closest form"
    >
      <option value="">Все изделия</option>
      {% for device in devices %}
        <option value="{{ device.id }}" {% if filters.device == device.id|stringformat:"s" %}selected{% endif %}>{{ device.name }}</option>
      {% endfor %}
    </select>
    <button
      type="submit"
      hx-get="{% url 'workorders:board' %}"
      hx-target="#board-columns"
      hx-swap="outerHTML"
      hx-include="closest form"
    >
      Применить
    </button>
    <a href="{% url 'workorders:create' %}" class="compact-link-button">Создать заявку</a>
  </form>
</section>
{% include "workorders/partials/board_columns.html" %}
{% include "workorders/partials/detail_panel_empty.html" %}
</div>
{% endblock %}
